<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--fg:#f2eee8;--muted:rgba(242,238,232,.65);--line:rgba(242,238,232,.10);--red:#e22b1d;--yellow:#ffd84d;--panel:#0c0c0c}
body{font-family:'Noto Sans KR',sans-serif;background:radial-gradient(circle at 15% 0%,rgba(226,43,29,.24),transparent 24%),linear-gradient(180deg,#040404,#090909 45%,#050505);color:var(--fg);min-height:100vh}
a{text-decoration:none;color:inherit}
.topbar{height:5px;background:linear-gradient(90deg,var(--red),#ff6a00)}
.page{max-width:1200px;margin:0 auto;padding:22px 18px 40px}
.header{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.badge{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.12);padding:10px 14px;border-radius:999px;background:rgba(0,0,0,.35);font-size:13px;font-weight:700}
.badge-dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 12px rgba(226,43,29,.8)}
.title-wrap{display:flex;flex-direction:column;gap:8px}
.kicker{font-size:12px;letter-spacing:.28em;color:var(--muted)}
.title{font-family:'Black Han Sans',sans-serif;font-size:clamp(34px,7vw,66px);line-height:1;color:var(--fg);letter-spacing:-.02em}
.sub{color:var(--muted);font-size:15px;line-height:1.7}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 18px;border-radius:14px;border:1px solid var(--line);font-weight:800;letter-spacing:.02em;background:#121212;color:var(--fg)}
.btn.primary{background:var(--red);border-color:var(--red);color:#fff}
.btn.ghost:hover,.btn.primary:hover{opacity:.92}
.panel{margin-top:22px;border:1px solid var(--line);background:rgba(255,255,255,.02);padding:18px;border-radius:22px;box-shadow:0 20px 40px rgba(0,0,0,.28)}
.panel-head{display:flex;justify-content:space-between;align-items:end;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.panel-title{font-size:22px;font-weight:900}
.panel-note{font-size:13px;color:var(--muted)}
.image-wrap{background:#0a0a0a;border:1px solid var(--line);border-radius:18px;padding:12px;overflow:hidden}
.guide-img{display:block;width:100%;height:auto;border-radius:12px}
.footer{margin-top:22px;color:var(--muted);font-size:13px;line-height:1.8}
.notice{margin-top:14px;padding:14px 16px;border-radius:16px;background:rgba(255,216,77,.08);border:1px solid rgba(255,216,77,.25);color:#f3e8b0;font-size:14px;line-height:1.7}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.card{border:1px solid var(--line);background:rgba(255,255,255,.02);padding:18px;border-radius:18px}
.card h3{font-size:18px;margin-bottom:8px}
.card p{font-size:14px;color:var(--muted);line-height:1.7}
@media (max-width:767px){.page{padding:16px 14px 34px}.panel{padding:14px;border-radius:18px}.grid{grid-template-columns:1fr}.btn{width:100%}}
</style>

</head>

</body>
