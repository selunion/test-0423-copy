<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>파업.com | 서명 적용 가이드</title>
<style>
body {
  margin: 0;
  font-family: "Malgun Gothic", Arial, sans-serif;
  background: #111;
  color: #f3f3f3;
}
.wrap {
  max-width: 980px;
  margin: 0 auto;
  padding: 24px;
}
h1 {
  margin: 0 0 20px;
  font-size: 32px;
}
.step {
  background: #1a1a1a;
  border: 1px solid #2c2c2c;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 18px;
}
.num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  background: #b30000;
  border-radius: 999px;
  font-weight: 700;
  margin-right: 8px;
  flex: 0 0 30px;
}
.text {
  font-size: 16px;
  line-height: 1.7;
  margin-bottom: 12px;
}
img {
  width: 100%;
  display: block;
  border-radius: 10px;
  border: 1px solid #3a3a3a;
  background: #0d0d0d;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>서명 적용 가이드</h1>
  <div class="step"><div class="text"><span class="num">1</span>KNOX 메일창에서 우측 위 톱니바퀴 버튼 클릭</div><img src="./assets/step_1.png" alt="step 1" /></div>
  <div class="step"><div class="text"><span class="num">2</span>메일 서명 버튼 클릭</div><img src="./assets/step_2.png" alt="step 2" /></div>
  <div class="step"><div class="text"><span class="num">3</span>표준서명 버튼 클릭</div><img src="./assets/step_3.png" alt="step 3" /></div>
  <div class="step"><div class="text"><span class="num">4</span>본인 서명 정보 드래그 해서 복사</div><img src="./assets/step_4.png" alt="step 4" /></div>
  <div class="step"><div class="text"><span class="num">5</span>서명 만들기 자동추출 창에 붙여넣고 누락된 정보가 있으면 채워서 이미지 복사</div><img src="./assets/step_5.png" alt="step 5" /></div>
  <div class="step"><div class="text"><span class="num">6</span>표준서명 수정 버튼 클릭</div><img src="./assets/step_6.png" alt="step 6" /></div>
  <div class="step"><div class="text"><span class="num">7</span>모든 내용 지우기</div><img src="./assets/step_7.png" alt="step 7" /></div>
  <div class="step"><div class="text"><span class="num">8</span>'www.samsung.com' 은 안 지워지니까 '초기업노동조합 조합원' 또는 . 으로 해서 빈칸처럼 처리</div><img src="./assets/step_8.png" alt="step 8" /></div>
  <div class="step"><div class="text"><span class="num">9</span>이미지 Ctrl + V 해서 메일 서명 본문에 붙여넣기</div><img src="./assets/step_9.png" alt="step 9" /></div>
  <div class="step"><div class="text"><span class="num">10</span>저장</div><img src="./assets/step_10.png" alt="step 10" /></div>
</div>
</body>
</html>
